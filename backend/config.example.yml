# =============================================================================
# ShellPilot — Example configuration
# =============================================================================
# Copy to config.yml and adjust to your environment.
# Use ${ENV_VAR} or ${ENV_VAR:-default} to reference environment variables.

server:
  port: 3100
  basePath: /api/v1
  cors:
    enabled: true
    origins:
      - http://localhost:5173
      - http://localhost:3000

database:
  provider: mongodb
  uri: ${DATABASE_URI:-mongodb://localhost:27017/shellpilot}

redis:
  host: ${REDIS_HOST:-localhost}
  port: ${REDIS_PORT:-6379}
  password: ${REDIS_PASSWORD:-}
  db: 0

auth:
  jwt:
    secret: ${JWT_SECRET:-change-me-in-production}
    expiresIn: 8h
  bootstrap:
    adminEmail: ${BOOTSTRAP_ADMIN_EMAIL:-admin@shellpilot.local}
    adminPassword: ${BOOTSTRAP_ADMIN_PASSWORD:-changeme}
  apiKeyPrefix: shp_

  # --- Authentication providers ---
  # `local` (email/password → own JWT) is the standalone default. `externalJwt`
  # validates tokens minted by an external identity provider via its JWKS endpoint,
  # mapping the token's user/tenant claims onto a federated principal. Both can be
  # enabled at once. Omit this block entirely for plain local auth.
  providers:
    local:
      enabled: true
    externalJwt:
      enabled: ${AUTH_EXTERNAL_JWT_ENABLED:-false}
      jwksUri: ${AUTH_EXTERNAL_JWKS_URI:-}
      issuer: ${AUTH_EXTERNAL_ISSUER:-}
      audience: ${AUTH_EXTERNAL_AUDIENCE:-}
      # Map the external token's claims onto the local principal. `externalUserId`
      # is the stable per-user key (unique per tenant); `clientUID` carries the
      # tenant and is matched against the scope extension of the same name.
      claimMapping:
        externalUserId: sub
        clientUID: client_uid
      # When enabled, a valid external token provisions its local user just-in-time
      # (no password) and exposes POST /users/sso-upsert; the user starts with their
      # own private rules. Pair with the clientUID extension below for multi-tenancy.

  # --- CLI login flow ---
  # Empty → the local SPA login is served (default flow). Set to an external login
  # URL to bounce the browser there instead (the SPA reads this via /public-config).
  cliLogin:
    redirectTo: ${AUTH_CLI_LOGIN_REDIRECT_TO:-}

# AES-256-GCM master key for credential storage.
# Generate with: openssl rand -base64 32
secrets:
  masterKey: ${SECRETS_MASTER_KEY}

# JIT token TTL (seconds). Tokens are issued by /credentials/issue and consumed
# (read once) via /credentials/verify.
jit:
  ttlSeconds: 60

# --- Entity extensions ---
# Activate to enable multi-tenancy. Leave empty for standalone mode.
#
# Example: scope all entities by clientUID via x-client-uid header.
#
# extensions:
#   properties:
#     - name: clientUID
#       type: string
#       required: true
#       index: true
#       entities: "*"
#       source: header
#       headerName: x-client-uid
extensions:
  properties: []

logging:
  level: info
  format: json

shellpilot:
  # Fallback enforcement when no policy is active.
  defaultEnforcement: warn
  # Glob patterns matched against args; matched values are replaced with *** in traces.
  redactPatterns:
    - "--token=*"
    - "--password=*"
    - "--api-key=*"

# --- Public CLI catalog registry ---
# The official catalog (index.yml + clis/<slug>.yml) lives in a Git repo. The
# backend fetches it over HTTP (never clones the source). ref=main so catalog
# updates flow without redeploying the backend; each imported entry is pinned in
# the DB to the version/sha it was imported at (updates are opt-in via the UI).
catalog:
  # github | local
  source: ${CATALOG_SOURCE:-github}
  # github: owner/repo   |   local: a directory path on disk
  repo: ${CATALOG_REPO:-devicai/shellpilot}
  ref: ${CATALOG_REF:-main}
  path: ${CATALOG_PATH:-catalog}
  # read-only token while the repo is private; empty once it's public.
  token: ${CATALOG_TOKEN:-}
  cacheTtlSeconds: ${CATALOG_CACHE_TTL:-300}
